name: CI

on:
  pull_request:
    branches: ["master", "main"]
  push:
    branches: ["master", "main"]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r BACKEND/Requirement.txt

      - name: Django system check
        working-directory: BACKEND
        env:
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: ci-placeholder-secret
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: MedConnect-main/package-lock.json

      - name: Install frontend dependencies
        working-directory: MedConnect-main
        run: npm ci

      - name: Build frontend
        working-directory: MedConnect-main
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./BACKEND
          file: ./BACKEND/DockerFile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/medconnect-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./MedConnect-main
          file: ./MedConnect-main/DockerFile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/medconnect-web:ci
