services:
  db:
    image: postgres:16-alpine
    container_name: medconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medconnect-net

  backend:
    build:
      context: ./BACKEND
      dockerfile: DockerFile
    image: ghcr.io/reacher-nomi/medconnect-backend:latest
    container_name: medconnect-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    networks:
      - medconnect-net

  web:
    build:
      context: ./MedConnect-main
      dockerfile: DockerFile
    image: ghcr.io/reacher-nomi/medconnect-web:latest
    container_name: medconnect-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - media_data:/var/www/media
    networks:
      - medconnect-net

volumes:
  postgres_data:
  media_data:

networks:
  medconnect-net: